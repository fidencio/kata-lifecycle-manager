# Wait for the latest argo workflow to complete (succeed or fail).
---
- name: Wait for workflow to finish
  ansible.builtin.command:
    cmd: argo wait @latest -n {{ argo_namespace }}
  register: workflow_wait_result
  changed_when: false
  failed_when: false
  timeout: "{{ workflow_timeout }}"
