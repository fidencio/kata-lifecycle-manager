#
# Submit an upgrade workflow via argo CLI.
#
# Required vars:
#   target_version - kata-deploy version to upgrade to
#   node_selector  - label selector for nodes
#
# Optional vars:
#   extra_submit_args - additional -p flags (string)
---
- name: Build argo submit command
  ansible.builtin.set_fact:
    _submit_cmd: >-
      argo submit -n {{ argo_namespace }}
      --from workflowtemplate/kata-lifecycle-manager
      -p target-version={{ target_version }}
      -p node-selector="{{ node_selector }}"
      {{ extra_submit_args | default('') }}

- name: Submit upgrade workflow
  ansible.builtin.shell:
    cmd: "{{ _submit_cmd }}"
  register: submit_result
  changed_when: submit_result.rc == 0
