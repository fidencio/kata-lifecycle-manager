# Assert that the kata-deploy pod on a node runs the expected image.
# Required vars: node_name, expected_image (substring match)
---
- name: Get kata-deploy image on {{ node_name }}
  ansible.builtin.shell:
    cmd: >-
      kubectl get pods -n {{ helm_namespace }} -l name=kata-deploy
      --field-selector spec.nodeName={{ node_name }}
      -o jsonpath='{.items[0].spec.containers[0].image}'
  register: _deploy_image
  changed_when: false

- name: Assert kata-deploy image contains {{ expected_image }}
  ansible.builtin.assert:
    that:
      - expected_image in _deploy_image.stdout
    fail_msg: "kata-deploy image on {{ node_name }} is '{{ _deploy_image.stdout }}', expected to contain '{{ expected_image }}'"
    success_msg: "kata-deploy image on {{ node_name }} contains '{{ expected_image }}'"
