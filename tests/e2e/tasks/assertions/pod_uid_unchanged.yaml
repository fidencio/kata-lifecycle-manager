# Assert a pod UID has NOT changed (pod was not recreated).
# Required vars: pod_name, pod_namespace, saved_uid
---
- name: Get current UID of pod {{ pod_name }}
  ansible.builtin.command:
    cmd: >-
      kubectl get pod {{ pod_name }} -n {{ pod_namespace }}
      -o jsonpath='{.metadata.uid}'
  register: _current_uid
  changed_when: false

- name: Assert pod {{ pod_name }} UID is unchanged
  ansible.builtin.assert:
    that:
      - _current_uid.stdout == saved_uid
    fail_msg: "Pod UID changed from '{{ saved_uid }}' to '{{ _current_uid.stdout }}' (pod was recreated)"
    success_msg: "Pod UID unchanged: {{ saved_uid }}"
