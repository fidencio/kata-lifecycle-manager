---
- name: Create argo namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ argo_namespace }}
  register: ns_result
  changed_when: ns_result.rc == 0
  failed_when: ns_result.rc != 0 and 'already exists' not in ns_result.stderr

- name: Install Argo Workflows {{ argo_version }}
  ansible.builtin.command:
    cmd: >-
      kubectl apply -n {{ argo_namespace }}
      -f https://github.com/argoproj/argo-workflows/releases/download/{{ argo_version }}/quick-start-minimal.yaml
  register: argo_install
  changed_when: "'created' in argo_install.stdout or 'configured' in argo_install.stdout"

- name: Wait for argo-server deployment to be available
  ansible.builtin.command:
    cmd: >-
      kubectl rollout status deployment/argo-server
      -n {{ argo_namespace }} --timeout=120s
  changed_when: false

- name: Wait for workflow-controller deployment to be available
  ansible.builtin.command:
    cmd: >-
      kubectl rollout status deployment/workflow-controller
      -n {{ argo_namespace }} --timeout=120s
  changed_when: false
