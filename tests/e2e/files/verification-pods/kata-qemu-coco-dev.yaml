# Verification pod for kata-qemu-coco-dev runtime.
# Placeholders ${TEST_POD} and ${NODE} are substituted by the lifecycle-manager.
apiVersion: v1
kind: Pod
metadata:
  name: ${TEST_POD}
spec:
  runtimeClassName: kata-qemu-coco-dev
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: ${NODE}
  tolerations:
    - operator: Exists
  containers:
    - name: verify
      image: quay.io/kata-containers/alpine-bash-curl:latest
      command:
        - sh
        - -c
        - |
          echo "=== Kata Verification ==="
          echo "Runtime: kata-qemu-coco-dev"
          echo "Kernel: $(uname -r)"
          echo "SUCCESS: Pod running with Kata runtime"
