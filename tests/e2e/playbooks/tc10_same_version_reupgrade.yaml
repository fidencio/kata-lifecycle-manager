#
# TC-10: Same Version Re-upgrade (Idempotency)
# Performs an upgrade, clears state (but keeps kata-deploy installed),
# then submits the same upgrade again. Verifies the workflow handles
# an already-at-target-version cluster idempotently.
---
- name: "TC-10: Same Version Re-upgrade (Idempotency)"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reset environment
      ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

    - name: Build upgrade extra arguments
      ansible.builtin.set_fact:
        _tc10_extra_args: >-
          {{ '-p helm-set-values="' + kata_to_helm_set_values + '"' if kata_to_helm_set_values | default('') | length > 0 else '' }}

    - name: Perform initial upgrade
      ansible.builtin.include_tasks: ../tasks/perform_basic_upgrade.yaml
      vars:
        upgrade_node: "{{ worker_node_a }}"
        upgrade_target_version: "{{ kata_to_version }}"
        upgrade_extra_args: "{{ _tc10_extra_args }}"

    - name: Assert initial upgrade succeeded
      ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
      vars:
        expected_status: Succeeded

    - name: Delete all workflows
      ansible.builtin.command:
        cmd: kubectl delete workflows -n {{ argo_namespace }} --all
      register: _wf_cleanup
      changed_when: _wf_cleanup.rc == 0
      failed_when: false

    - name: Clean node annotations
      ansible.builtin.shell:
        cmd: >-
          kubectl annotate node {{ worker_node_a }}
          katacontainers.io/kata-lifecycle-manager-status-
          katacontainers.io/kata-current-version-
      changed_when: true
      failed_when: false

    - name: Re-label worker node A for second upgrade
      ansible.builtin.command:
        cmd: >-
          kubectl label node {{ worker_node_a }}
          katacontainers.io/kata-lifecycle-manager-window=true
          --overwrite

    - name: Submit same upgrade again
      ansible.builtin.include_tasks: ../tasks/submit_upgrade.yaml
      vars:
        target_version: "{{ kata_to_version }}"
        node_selector: "katacontainers.io/kata-lifecycle-manager-window=true"
        extra_submit_args: "{{ _tc10_extra_args }}"

    - name: Wait for re-upgrade workflow to finish
      ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

    - name: Assert re-upgrade workflow succeeded
      ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
      vars:
        expected_status: Succeeded

    - name: Assert node annotation status is completed
      ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
      vars:
        node_name: "{{ worker_node_a }}"
        annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
        expected_value: completed
