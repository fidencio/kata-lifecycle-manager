#
# TC-05: Upgrade with Drain Enabled
#
# Scenario A: Drain enabled via submit-time parameter override.
# Scenario B: Drain enabled via persistent helm values.
---
- name: "TC-05: Upgrade with Drain Enabled"
  hosts: localhost
  gather_facts: false
  tasks:
    # ── Scenario A: Submit-time parameter override ──
    - name: "Scenario A - Drain via submit-time parameter"
      block:
        - name: "Scenario A - Reset environment"
          ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

        - name: "Scenario A - Label worker_node_a for upgrade window"
          ansible.builtin.command:
            cmd: >-
              kubectl label node {{ worker_node_a }}
              katacontainers.io/kata-lifecycle-manager-window=true
              --overwrite

        - name: "Scenario A - Build extra submit args with drain"
          ansible.builtin.set_fact:
            _tc05a_extra_args: >-
              -p drain-enabled=true -p drain-timeout=300s
              {{ '-p helm-set-values="' + kata_to_helm_set_values + '"'
                 if kata_to_helm_set_values | default('') | length > 0
                 else '' }}

        - name: "Scenario A - Submit upgrade workflow with drain enabled"
          ansible.builtin.include_tasks: ../tasks/submit_upgrade.yaml
          vars:
            target_version: "{{ kata_to_version }}"
            node_selector: "katacontainers.io/kata-lifecycle-manager-window=true"
            extra_submit_args: "{{ _tc05a_extra_args }}"

        - name: "Scenario A - Wait for workflow to finish"
          ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

        - name: "Scenario A - Assert workflow succeeded"
          ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
          vars:
            expected_status: "Succeeded"

        - name: "Scenario A - Assert drain step was executed"
          ansible.builtin.include_tasks: ../tasks/assertions/workflow_step_status.yaml
          vars:
            step_template: "drain-node"
            expected_phase: "Succeeded"

    # ── Scenario B: Helm values persistence ──
    - name: "Scenario B - Drain via persistent helm values"
      block:
        - name: "Scenario B - Reset environment"
          ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

        - name: "Scenario B - Enable drain in lifecycle-manager helm defaults"
          ansible.builtin.command:
            cmd: >-
              helm upgrade kata-lifecycle-manager
              {{ lifecycle_manager_chart_path | default('.') }}
              -n {{ argo_namespace }}
              --reuse-values
              --set defaults.drainEnabled=true

        - name: "Scenario B - Label worker_node_a for upgrade window"
          ansible.builtin.command:
            cmd: >-
              kubectl label node {{ worker_node_a }}
              katacontainers.io/kata-lifecycle-manager-window=true
              --overwrite

        - name: "Scenario B - Build extra submit args"
          ansible.builtin.set_fact:
            _tc05b_extra_args: >-
              {{ '-p helm-set-values="' + kata_to_helm_set_values + '"'
                 if kata_to_helm_set_values | default('') | length > 0
                 else '' }}

        - name: "Scenario B - Submit upgrade workflow without drain parameter"
          ansible.builtin.include_tasks: ../tasks/submit_upgrade.yaml
          vars:
            target_version: "{{ kata_to_version }}"
            node_selector: "katacontainers.io/kata-lifecycle-manager-window=true"
            extra_submit_args: "{{ _tc05b_extra_args }}"

        - name: "Scenario B - Wait for workflow to finish"
          ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

        - name: "Scenario B - Assert workflow succeeded"
          ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
          vars:
            expected_status: "Succeeded"

        - name: "Scenario B - Assert drain step was executed"
          ansible.builtin.include_tasks: ../tasks/assertions/workflow_step_status.yaml
          vars:
            step_template: "drain-node"
            expected_phase: "Succeeded"

        - name: "Scenario B - Restore lifecycle-manager helm drain default"
          ansible.builtin.command:
            cmd: >-
              helm upgrade kata-lifecycle-manager
              {{ lifecycle_manager_chart_path | default('.') }}
              -n {{ argo_namespace }}
              --reuse-values
              --set defaults.drainEnabled=false
