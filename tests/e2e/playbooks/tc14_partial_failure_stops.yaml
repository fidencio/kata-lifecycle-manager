#
# TC-14: Partial Failure Stops Workflow -- Node-A Succeeds, Node-B Fails
#
# Labels both nodes for upgrade but marks worker_node_b with test-role=fail,
# causing the verification pod to fail on that node. Verifies that the
# workflow reports failure, worker_node_a completes successfully, and
# worker_node_b is automatically rolled back. Both nodes remain schedulable.
---
- name: "TC-14: Partial Failure Stops Workflow -- Node-A Succeeds, Node-B Fails"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reset environment
      ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

    - name: Base64-encode the partial-fail verification pod manifest
      ansible.builtin.shell:
        cmd: base64 -w0 {{ playbook_dir }}/../files/partial-fail-verification-pod.yaml
      register: _tc14_verification_pod_b64
      changed_when: false

    - name: Label worker_node_a for upgrade window
      ansible.builtin.command:
        cmd: >-
          kubectl label node {{ worker_node_a }}
          katacontainers.io/kata-lifecycle-manager-window=true
          --overwrite

    - name: Label worker_node_b for upgrade window
      ansible.builtin.command:
        cmd: >-
          kubectl label node {{ worker_node_b }}
          katacontainers.io/kata-lifecycle-manager-window=true
          --overwrite

    - name: Label worker_node_b with test-role=fail
      ansible.builtin.command:
        cmd: >-
          kubectl label node {{ worker_node_b }}
          test-role=fail
          --overwrite

    - name: Build extra submit args
      ansible.builtin.set_fact:
        _tc14_extra_args: >-
          -p verification-pod={{ _tc14_verification_pod_b64.stdout }}
          {{ '-p helm-set-values="' + kata_to_helm_set_values + '"'
             if kata_to_helm_set_values | default('') | length > 0
             else '' }}

    - name: Submit upgrade workflow
      ansible.builtin.include_tasks: ../tasks/submit_upgrade.yaml
      vars:
        target_version: "{{ kata_to_version }}"
        node_selector: "katacontainers.io/kata-lifecycle-manager-window=true"
        extra_submit_args: "{{ _tc14_extra_args }}"

    - name: Wait for workflow to finish
      ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

    - name: Assert workflow failed
      ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
      vars:
        expected_status: "Failed"

    - name: Assert worker_node_a annotation status is completed
      ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
      vars:
        node_name: "{{ worker_node_a }}"
        annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
        expected_value: "completed"

    - name: Assert worker_node_b annotation status is rolled-back
      ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
      vars:
        node_name: "{{ worker_node_b }}"
        annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
        expected_value: "rolled-back"

    - name: Assert worker_node_a is schedulable
      ansible.builtin.include_tasks: ../tasks/assertions/node_schedulable.yaml
      vars:
        node_name: "{{ worker_node_a }}"

    - name: Assert worker_node_b is schedulable
      ansible.builtin.include_tasks: ../tasks/assertions/node_schedulable.yaml
      vars:
        node_name: "{{ worker_node_b }}"

    - name: Remove test-role label from worker_node_b
      ansible.builtin.command:
        cmd: kubectl label node {{ worker_node_b }} test-role-
      changed_when: true
      failed_when: false
