# TC-13: Node-by-Node Upgrade Using Sequential Workflow (Multi-Node)
#
# Labels both worker nodes, submits a single upgrade workflow, and verifies
# that all nodes are upgraded sequentially. Checks that both kata-deploy
# pods were recreated, images updated, annotations set, and nodes remain
# schedulable.
---
- name: "TC-13: Node-by-Node Upgrade Using Sequential Workflow (Multi-Node)"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reset environment
      ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

    - name: Record kata-deploy pod UID on worker_node_a
      ansible.builtin.shell:
        cmd: >-
          kubectl get pods -n {{ helm_namespace }} -l name=kata-deploy
          --field-selector spec.nodeName={{ worker_node_a }}
          -o jsonpath='{.items[0].metadata.uid}'
      register: _tc13_pod_a_uid_before
      changed_when: false

    - name: Record kata-deploy pod UID on worker_node_b
      ansible.builtin.shell:
        cmd: >-
          kubectl get pods -n {{ helm_namespace }} -l name=kata-deploy
          --field-selector spec.nodeName={{ worker_node_b }}
          -o jsonpath='{.items[0].metadata.uid}'
      register: _tc13_pod_b_uid_before
      changed_when: false

    - name: Label worker_node_a for upgrade window
      ansible.builtin.command:
        cmd: >-
          kubectl label node {{ worker_node_a }}
          katacontainers.io/kata-lifecycle-manager-window=true
          --overwrite

    - name: Label worker_node_b for upgrade window
      ansible.builtin.command:
        cmd: >-
          kubectl label node {{ worker_node_b }}
          katacontainers.io/kata-lifecycle-manager-window=true
          --overwrite

    - name: Build extra submit args
      ansible.builtin.set_fact:
        _tc13_extra_args: >-
          {{ '-p helm-set-values="' + kata_to_helm_set_values + '"'
             if kata_to_helm_set_values | default('') | length > 0
             else '' }}

    - name: Submit upgrade workflow
      ansible.builtin.include_tasks: ../tasks/submit_upgrade.yaml
      vars:
        target_version: "{{ kata_to_version }}"
        node_selector: "katacontainers.io/kata-lifecycle-manager-window=true"
        extra_submit_args: "{{ _tc13_extra_args }}"

    - name: Wait for workflow to finish
      ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

    - name: Assert workflow succeeded
      ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
      vars:
        expected_status: "Succeeded"

    - name: Assert kata-deploy image on worker_node_a contains target version
      ansible.builtin.include_tasks: ../tasks/assertions/kata_deploy_image.yaml
      vars:
        node_name: "{{ worker_node_a }}"
        expected_image: "{{ kata_to_version }}"

    - name: Assert kata-deploy image on worker_node_b contains target version
      ansible.builtin.include_tasks: ../tasks/assertions/kata_deploy_image.yaml
      vars:
        node_name: "{{ worker_node_b }}"
        expected_image: "{{ kata_to_version }}"

    - name: Get kata-deploy pod UID on worker_node_a after upgrade
      ansible.builtin.shell:
        cmd: >-
          kubectl get pods -n {{ helm_namespace }} -l name=kata-deploy
          --field-selector spec.nodeName={{ worker_node_a }}
          -o jsonpath='{.items[0].metadata.uid}'
      register: _tc13_pod_a_uid_after
      changed_when: false

    - name: Assert kata-deploy pod on worker_node_a was recreated
      ansible.builtin.assert:
        that:
          - _tc13_pod_a_uid_after.stdout != _tc13_pod_a_uid_before.stdout
        fail_msg: >-
          Pod UID on worker_node_a is still '{{ _tc13_pod_a_uid_before.stdout }}'
          (pod was NOT recreated)
        success_msg: >-
          Pod UID on worker_node_a changed from '{{ _tc13_pod_a_uid_before.stdout }}'
          to '{{ _tc13_pod_a_uid_after.stdout }}'

    - name: Get kata-deploy pod UID on worker_node_b after upgrade
      ansible.builtin.shell:
        cmd: >-
          kubectl get pods -n {{ helm_namespace }} -l name=kata-deploy
          --field-selector spec.nodeName={{ worker_node_b }}
          -o jsonpath='{.items[0].metadata.uid}'
      register: _tc13_pod_b_uid_after
      changed_when: false

    - name: Assert kata-deploy pod on worker_node_b was recreated
      ansible.builtin.assert:
        that:
          - _tc13_pod_b_uid_after.stdout != _tc13_pod_b_uid_before.stdout
        fail_msg: >-
          Pod UID on worker_node_b is still '{{ _tc13_pod_b_uid_before.stdout }}'
          (pod was NOT recreated)
        success_msg: >-
          Pod UID on worker_node_b changed from '{{ _tc13_pod_b_uid_before.stdout }}'
          to '{{ _tc13_pod_b_uid_after.stdout }}'

    - name: Assert worker_node_a annotation status is completed
      ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
      vars:
        node_name: "{{ worker_node_a }}"
        annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
        expected_value: "completed"

    - name: Assert worker_node_b annotation status is completed
      ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
      vars:
        node_name: "{{ worker_node_b }}"
        annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
        expected_value: "completed"

    - name: Assert worker_node_a is schedulable
      ansible.builtin.include_tasks: ../tasks/assertions/node_schedulable.yaml
      vars:
        node_name: "{{ worker_node_a }}"

    - name: Assert worker_node_b is schedulable
      ansible.builtin.include_tasks: ../tasks/assertions/node_schedulable.yaml
      vars:
        node_name: "{{ worker_node_b }}"
