#
# TC-03: Manual Rollback
#
# Performs a successful upgrade first, then submits a manual rollback
# workflow. Verifies that the rollback succeeds, helm history shows
# a rollback revision, and the node annotation reflects rolled-back state.
---
- name: "TC-03: Manual Rollback"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reset environment
      ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

    - name: Build upgrade extra args
      ansible.builtin.set_fact:
        _tc03_upgrade_extra_args: >-
          {{ '-p helm-set-values="' + kata_to_helm_set_values + '"'
             if kata_to_helm_set_values | default('') | length > 0
             else '' }}

    - name: Perform basic upgrade on worker_node_a
      ansible.builtin.include_tasks: ../tasks/perform_basic_upgrade.yaml
      vars:
        upgrade_node: "{{ worker_node_a }}"
        upgrade_target_version: "{{ kata_to_version }}"
        upgrade_extra_args: "{{ _tc03_upgrade_extra_args }}"

    - name: Assert upgrade workflow succeeded
      ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
      vars:
        expected_status: "Succeeded"

    - name: Delete all workflows before rollback
      ansible.builtin.command:
        cmd: kubectl delete workflows -n {{ argo_namespace }} --all
      register: _tc03_wf_delete
      changed_when: _tc03_wf_delete.rc == 0

    - name: Submit manual rollback for worker_node_a
      ansible.builtin.include_tasks: ../tasks/submit_rollback.yaml
      vars:
        node_name: "{{ worker_node_a }}"
        target_version: "{{ kata_to_version }}"

    - name: Wait for rollback workflow to finish
      ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

    - name: Assert rollback workflow succeeded
      ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
      vars:
        expected_status: "Succeeded"

    - name: Assert helm rollback occurred
      ansible.builtin.include_tasks: ../tasks/assertions/helm_rollback_occurred.yaml

    - name: Assert node annotation status is rolled-back
      ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
      vars:
        node_name: "{{ worker_node_a }}"
        annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
        expected_value: "rolled-back"

    - name: Assert worker_node_a is schedulable
      ansible.builtin.include_tasks: ../tasks/assertions/node_schedulable.yaml
      vars:
        node_name: "{{ worker_node_a }}"
