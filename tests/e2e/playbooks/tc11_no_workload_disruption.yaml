# TC-11: No Workload Disruption During Upgrade/Downgrade
# Deploys a long-running kata workload, performs an upgrade and rollback,
# then verifies the workload pod was never restarted or recreated.
---
- name: "TC-11: No Workload Disruption During Upgrade/Downgrade"
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Reset environment
      ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

    - name: Apply long-running workload pod
      ansible.builtin.command:
        cmd: kubectl apply -f {{ playbook_dir }}/../files/long-running-workload.yaml

    - name: Wait for workload pod to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl wait --for=condition=Ready
          pod/kata-long-running-workload
          --timeout=120s

    - name: Record workload pod UID
      ansible.builtin.command:
        cmd: >-
          kubectl get pod kata-long-running-workload
          -o jsonpath='{.metadata.uid}'
      register: _workload_uid
      changed_when: false

    - name: Save workload UID
      ansible.builtin.set_fact:
        saved_workload_uid: "{{ _workload_uid.stdout }}"

    - name: Record initial restart count
      ansible.builtin.shell:
        cmd: >-
          kubectl get pod kata-long-running-workload
          -o jsonpath='{.status.containerStatuses[0].restartCount}'
      register: _initial_restarts
      changed_when: false

    - name: Assert initial restart count is zero
      ansible.builtin.assert:
        that:
          - _initial_restarts.stdout | int == 0
        fail_msg: "Initial restart count is {{ _initial_restarts.stdout }}, expected 0"
        success_msg: "Initial restart count is 0"

    - name: Build upgrade extra arguments
      ansible.builtin.set_fact:
        _tc11_extra_args: >-
          {{ '-p helm-set-values="' + kata_to_helm_set_values + '"' if kata_to_helm_set_values | default('') | length > 0 else '' }}

    - name: Perform upgrade
      ansible.builtin.include_tasks: ../tasks/perform_basic_upgrade.yaml
      vars:
        upgrade_node: "{{ worker_node_a }}"
        upgrade_target_version: "{{ kata_to_version }}"
        upgrade_extra_args: "{{ _tc11_extra_args }}"

    - name: Assert upgrade succeeded
      ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
      vars:
        expected_status: Succeeded

    - name: Assert workload pod UID unchanged after upgrade
      ansible.builtin.include_tasks: ../tasks/assertions/pod_uid_unchanged.yaml
      vars:
        pod_name: kata-long-running-workload
        pod_namespace: default
        saved_uid: "{{ saved_workload_uid }}"

    - name: Assert workload pod is still running after upgrade
      ansible.builtin.include_tasks: ../tasks/assertions/pod_phase.yaml
      vars:
        pod_name: kata-long-running-workload
        pod_namespace: default
        expected_phase: Running

    - name: Record restart count after upgrade
      ansible.builtin.shell:
        cmd: >-
          kubectl get pod kata-long-running-workload
          -o jsonpath='{.status.containerStatuses[0].restartCount}'
      register: _post_upgrade_restarts
      changed_when: false

    - name: Assert restart count is still zero after upgrade
      ansible.builtin.assert:
        that:
          - _post_upgrade_restarts.stdout | int == 0
        fail_msg: "Restart count after upgrade is {{ _post_upgrade_restarts.stdout }}, expected 0"
        success_msg: "Restart count after upgrade is still 0"

    - name: Delete upgrade workflows
      ansible.builtin.command:
        cmd: kubectl delete workflows -n {{ argo_namespace }} --all
      register: _wf_delete
      changed_when: _wf_delete.rc == 0
      failed_when: false

    - name: Submit rollback for worker node A
      ansible.builtin.include_tasks: ../tasks/submit_rollback.yaml
      vars:
        node_name: "{{ worker_node_a }}"
        target_version: "{{ kata_to_version }}"

    - name: Wait for rollback workflow to finish
      ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

    - name: Assert workload pod UID unchanged after rollback
      ansible.builtin.include_tasks: ../tasks/assertions/pod_uid_unchanged.yaml
      vars:
        pod_name: kata-long-running-workload
        pod_namespace: default
        saved_uid: "{{ saved_workload_uid }}"

    - name: Assert workload pod is still running after rollback
      ansible.builtin.include_tasks: ../tasks/assertions/pod_phase.yaml
      vars:
        pod_name: kata-long-running-workload
        pod_namespace: default
        expected_phase: Running

    - name: Delete long-running workload pod
      ansible.builtin.command:
        cmd: kubectl delete pod kata-long-running-workload --ignore-not-found
      changed_when: true
