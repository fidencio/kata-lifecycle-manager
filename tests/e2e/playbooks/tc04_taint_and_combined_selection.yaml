#
# TC-04: Taint-based and Combined Node Selection
#
# Scenario A: Upgrade using taint-only node selection.
# Scenario B: Upgrade using combined label + taint node selection.
---
- name: "TC-04: Taint-based and Combined Node Selection"
  hosts: localhost
  gather_facts: false
  tasks:
    # ── Scenario A: Taint-Only Selection ──
    - name: "Scenario A - Taint-only selection"
      block:
        - name: "Scenario A - Reset environment"
          ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

        - name: "Scenario A - Taint worker_node_a"
          ansible.builtin.command:
            cmd: >-
              kubectl taint nodes {{ worker_node_a }}
              kata-lifecycle-manager=pending:NoSchedule
              --overwrite

        - name: "Scenario A - Build argo submit command"
          ansible.builtin.set_fact:
            _tc04a_submit_cmd: >-
              argo submit -n {{ argo_namespace }}
              --from workflowtemplate/kata-lifecycle-manager
              -p target-version={{ kata_to_version }}
              -p node-taint-key=kata-lifecycle-manager
              -p node-taint-value=pending
              {{ '-p helm-set-values="' + kata_to_helm_set_values + '"'
                 if kata_to_helm_set_values | default('') | length > 0
                 else '' }}

        - name: "Scenario A - Submit upgrade workflow via taint selection"
          ansible.builtin.shell:
            cmd: "{{ _tc04a_submit_cmd }}"
          register: _tc04a_submit
          changed_when: _tc04a_submit.rc == 0

        - name: "Scenario A - Wait for workflow to finish"
          ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

        - name: "Scenario A - Assert workflow succeeded"
          ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
          vars:
            expected_status: "Succeeded"

        - name: "Scenario A - Assert node annotation status is completed"
          ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
          vars:
            node_name: "{{ worker_node_a }}"
            annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
            expected_value: "completed"

        - name: "Scenario A - Assert worker_node_a is schedulable"
          ansible.builtin.include_tasks: ../tasks/assertions/node_schedulable.yaml
          vars:
            node_name: "{{ worker_node_a }}"

        - name: "Scenario A - Remove taint from worker_node_a"
          ansible.builtin.command:
            cmd: kubectl taint nodes {{ worker_node_a }} kata-lifecycle-manager-
          changed_when: true
          failed_when: false

    # ── Scenario B: Combined Label + Taint Selection ──
    - name: "Scenario B - Combined label and taint selection"
      block:
        - name: "Scenario B - Reset environment"
          ansible.builtin.include_tasks: ../tasks/reset_environment.yaml

        - name: "Scenario B - Label worker_node_a for upgrade window"
          ansible.builtin.command:
            cmd: >-
              kubectl label node {{ worker_node_a }}
              katacontainers.io/kata-lifecycle-manager-window=true
              --overwrite

        - name: "Scenario B - Taint worker_node_a"
          ansible.builtin.command:
            cmd: >-
              kubectl taint nodes {{ worker_node_a }}
              kata-lifecycle-manager=pending:NoSchedule
              --overwrite

        - name: "Scenario B - Build argo submit command"
          ansible.builtin.set_fact:
            _tc04b_submit_cmd: >-
              argo submit -n {{ argo_namespace }}
              --from workflowtemplate/kata-lifecycle-manager
              -p target-version={{ kata_to_version }}
              -p node-selector="katacontainers.io/kata-lifecycle-manager-window=true"
              -p node-taint-key=kata-lifecycle-manager
              -p node-taint-value=pending
              {{ '-p helm-set-values="' + kata_to_helm_set_values + '"'
                 if kata_to_helm_set_values | default('') | length > 0
                 else '' }}

        - name: "Scenario B - Submit upgrade workflow via combined selection"
          ansible.builtin.shell:
            cmd: "{{ _tc04b_submit_cmd }}"
          register: _tc04b_submit
          changed_when: _tc04b_submit.rc == 0

        - name: "Scenario B - Wait for workflow to finish"
          ansible.builtin.include_tasks: ../tasks/wait_workflow.yaml

        - name: "Scenario B - Assert workflow succeeded"
          ansible.builtin.include_tasks: ../tasks/assertions/workflow_status.yaml
          vars:
            expected_status: "Succeeded"

        - name: "Scenario B - Assert node annotation status is completed"
          ansible.builtin.include_tasks: ../tasks/assertions/node_annotation.yaml
          vars:
            node_name: "{{ worker_node_a }}"
            annotation_key: "katacontainers.io/kata-lifecycle-manager-status"
            expected_value: "completed"

        - name: "Scenario B - Assert worker_node_a is schedulable"
          ansible.builtin.include_tasks: ../tasks/assertions/node_schedulable.yaml
          vars:
            node_name: "{{ worker_node_a }}"

        - name: "Scenario B - Remove taint from worker_node_a"
          ansible.builtin.command:
            cmd: kubectl taint nodes {{ worker_node_a }} kata-lifecycle-manager-
          changed_when: true
          failed_when: false
